<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;family=Inter:wght@300..700&amp;family=JetBrains+Mono:wght@400..700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary": "#5a1b00",
                    "tertiary-fixed-dim": "#c8c6c5",
                    "tertiary": "#c8c6c5",
                    "on-tertiary-container": "#2c2b2b",
                    "on-secondary-fixed-variant": "#004397",
                    "error": "#ffb4ab",
                    "outline": "#ab897d",
                    "surface-variant": "#343535",
                    "on-secondary-fixed": "#001a43",
                    "surface-container-highest": "#343535",
                    "surface-tint": "#ffb59a",
                    "on-secondary-container": "#00275e",
                    "surface-dim": "#121414",
                    "outline-variant": "#5b4137",
                    "on-secondary": "#002e6b",
                    "primary": "#ffb59a",
                    "surface-bright": "#383939",
                    "on-primary-fixed": "#370e00",
                    "on-tertiary": "#313030",
                    "secondary": "#aec6ff",
                    "primary-fixed": "#ffdbce",
                    "on-tertiary-fixed-variant": "#474646",
                    "inverse-on-surface": "#303031",
                    "on-error": "#690005",
                    "on-surface-variant": "#e4beb1",
                    "surface-container-low": "#1b1c1c",
                    "inverse-surface": "#e3e2e2",
                    "secondary-fixed": "#d8e2ff",
                    "on-tertiary-fixed": "#1c1b1b",
                    "inverse-primary": "#a73a00",
                    "tertiary-fixed": "#e5e2e1",
                    "on-primary-fixed-variant": "#802a00",
                    "secondary-container": "#508eff",
                    "surface-container": "#1f2020",
                    "surface-container-lowest": "#0d0e0f",
                    "primary-container": "#ff5c00",
                    "primary-fixed-dim": "#ffb59a",
                    "on-surface": "#e3e2e2",
                    "background": "#000000",
                    "surface": "#121414",
                    "on-primary-container": "#521800",
                    "error-container": "#93000a",
                    "on-error-container": "#ffdad6",
                    "on-background": "#e3e2e2",
                    "secondary-fixed-dim": "#aec6ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "unit": "4px",
                    "margin": "24px",
                    "gutter": "16px",
                    "container-max": "1440px"
            },
            "fontFamily": {
                    "display-lg": ["Space Grotesk"],
                    "body-sm": ["Inter"],
                    "body-base": ["Inter"],
                    "code-block": ["JetBrains Mono"],
                    "headline-md": ["Space Grotesk"],
                    "label-caps": ["Inter"]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #000000;
            color: #e3e2e2;
        }
    </style>
</head>
<body class="font-body-base overflow-x-hidden">
<!-- TopAppBar Section -->
<header class="bg-surface/80 backdrop-blur-xl docked full-width top-0 z-50 border-b border-surface-variant flex justify-between items-center px-margin w-full fixed h-20" style="font-family: 'Source Han Sans SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;">
<div class="flex items-center gap-8">
<span class="text-xl font-display-lg text-white tracking-tighter"><span class="text-2xl font-bold text-primary-container tracking-tight" style="font-family: 'Source Han Sans SC', 'Noto Sans SC', sans-serif;">SkillForge</span></span>
<nav class="hidden md:flex gap-8 ml-4" style="font-family: 'Source Han Sans SC', 'Noto Sans SC', sans-serif;"><a class="text-body-base text-on-surface-variant hover:text-primary transition-all cursor-pointer font-medium" href="#">首页</a>
<a class="text-body-base text-primary font-bold border-b-2 border-primary pb-1 cursor-pointer" href="#">控制台</a>
<a class="text-body-base text-on-surface-variant hover:text-primary transition-all cursor-pointer font-medium" href="#">文档</a>
<a class="text-body-base text-on-surface-variant hover:text-primary transition-all cursor-pointer font-medium" href="#">社区</a></nav>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-zinc-500 hover:text-white cursor-pointer" data-icon="terminal">terminal</span>
<button class="font-['Space_Grotesk'] uppercase tracking-widest text-xs px-4 py-2 bg-primary-container text-on-primary-container font-bold rounded-DEFAULT active:scale-95 transition-all">Sign Up</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="min-h-screen pt-24 pb-12 flex flex-col items-center justify-center relative px-6">
<!-- Abstract Background Glow -->
<div class="absolute inset-0 overflow-hidden pointer-events-none -z-10">
<div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-[#FF5C00]/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-1/4 right-1/4 w-[500px] h-[500px] bg-secondary-container/5 blur-[100px] rounded-full"></div>
</div>
<!-- Signup Card Container -->
<div class="w-full max-w-md bg-[#080808] border border-[#1A1A1A] p-8 md:p-10 relative overflow-hidden">
<!-- Brand Mark / Image Section -->
<div class="mb-8 text-center">
<h1 class="font-display-lg text-display-lg text-white mb-2">加入 SkillForge</h1>
<p class="font-body-base text-zinc-500">开启您的 AI 技能锻造之旅。</p>
</div>
<!-- Signup Form -->
<form class="space-y-6">
<!-- Username Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-zinc-400 uppercase">用户名 / Username</label>
<div class="relative">
<input class="w-full bg-[#000000] border border-[#1A1A1A] focus:border-primary-container focus:ring-1 focus:ring-primary-container text-white py-3 px-4 transition-all outline-none font-body-base" placeholder="Enter your handle" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-zinc-600 text-sm" data-icon="person">person</span>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-zinc-400 uppercase">邮箱 / Email</label>
<div class="relative">
<input class="w-full bg-[#000000] border border-[#1A1A1A] focus:border-primary-container focus:ring-1 focus:ring-primary-container text-white py-3 px-4 transition-all outline-none font-body-base" placeholder="dev@skillforge.tech" type="email"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-zinc-600 text-sm" data-icon="alternate_email">alternate_email</span>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-zinc-400 uppercase">密码 / Password</label>
<div class="relative">
<input class="w-full bg-[#000000] border border-[#1A1A1A] focus:border-primary-container focus:ring-1 focus:ring-primary-container text-white py-3 px-4 transition-all outline-none font-body-base" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-zinc-600 text-sm" data-icon="lock">lock</span>
</div>
</div>
<!-- Terms & Technical Note -->
<div class="flex items-start gap-3">
<input class="mt-1 bg-black border-[#1A1A1A] text-primary-container focus:ring-primary-container rounded-sm" id="terms" type="checkbox"/>
<label class="font-body-sm text-body-sm text-zinc-500" for="terms">
                        我同意服务条款与隐私政策。
                    </label>
</div>
<div class="bg-[#121212] border border-[#1A1A1A] p-4 flex items-center gap-3">
<span class="material-symbols-outlined text-[#FF5C00] text-sm" data-icon="verified_user">verified_user</span>
<span class="font-code-block text-code-block text-zinc-400">Zero external dependencies, pure JWT auth</span>
</div>
<!-- Action Button -->
<button class="w-full bg-primary-container hover:bg-[#E05200] text-on-primary-container font-headline-md text-headline-md py-4 transition-all active:scale-[0.98] cursor-pointer" type="submit">
                    立即注册 / Sign Up
                </button>
</form>
<div class="mt-8 text-center">
<p class="font-body-base text-zinc-500">
                    已经拥有账户? 
                    <a class="text-white hover:text-primary-container transition-colors ml-1 font-bold" href="#">立即登录 / Login</a>
</p>
</div>
</div>
</main>
<!-- Footer Section -->
<footer class="bg-black full-width bottom-0 border-t border-[#1A1A1A] flex flex-col md:flex-row justify-between items-center px-8 py-12 w-full gap-4">
<p class="font-['Space_Grotesk'] text-xs text-zinc-500">© 2024 Forge Technical Industries. Built for high-velocity workflows.</p>
<div class="flex gap-6">
<a class="font-['Space_Grotesk'] text-xs text-zinc-600 hover:text-[#FF5C00] transition-colors" href="#">Privacy Policy</a>
<a class="font-['Space_Grotesk'] text-xs text-zinc-600 hover:text-[#FF5C00] transition-colors" href="#">Terms of Service</a>
<a class="font-['Space_Grotesk'] text-xs text-zinc-600 hover:text-[#FF5C00] transition-colors" href="#">Security Disclosure</a>
</div>
</footer>
</body></html>
